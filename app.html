<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
  </head>

  <body>

<div class="app-container">

<h1>AI Video Analyzer</h1>

<div class="preview-box">

<div id="videoPreview">
<p id="noVideoText">No video selected</p>
</div>

</div>

<div class="button-panel">

<input id="videoupload" type="file" accept="video/*" hidden onchange="previewVideo()">

<button onclick="document.getElementById('videoupload').click()">
Find Video
</button>

<button onclick="uploadVideo()">
Submit Video
</button>

</div>

<div class="panel">

<h3>Processing Status</h3>

<div id="jobid"></div>
<div id="status"></div>

</div>

<div class="panel">

<h3>Results</h3>

<div id="results"></div>

</div>

</div>

</body>
</html>
